<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ClassroomPlus – Submitted Work</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <span class="navbar-logo">ClassroomPlus</span>
    <div class="navbar-links">
      <a href="index.html" class="nav-link">Dashboard</a>
      <a href="submitted.html" class="nav-link active">Submitted Work</a>
      <div id="auth-area"></div>
    </div>
  </nav>

  <div class="main-content">
    <h1 class="page-title">Submitted Work</h1>

    <div class="filter-row">
      <button class="filter-btn active" onclick="filterWork('all', this)">All</button>
      <button class="filter-btn" onclick="filterWork('submitted', this)">Submitted</button>
      <button class="filter-btn" onclick="filterWork('graded', this)">Graded</button>
    </div>

    <div id="submitted-list"></div>
  </div>

  <script src="data.js"></script>
  <script src="submitted.js"></script>
  <script src="auth.js"></script>
  <footer class="footer">
    ClassroomPlus &nbsp;·&nbsp; A student productivity companion &nbsp;·&nbsp; Minor Project 2026
